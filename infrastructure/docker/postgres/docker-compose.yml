version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: homelab-postgres
    restart: always
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Hirusha@150721
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: